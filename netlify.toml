[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/sitemap"
  to = "/sitemap.xml"
  status = 301
  force = true

[[redirects]]
  from = "/sitemap/"
  to = "/sitemap.xml"
  status = 301
  force = true

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"
